<section class="flex flex-col gap-8 lg:m-50 my-10">
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div class="card bg-base-100">
      <div class="card-body gap-3 p-5 items-center text-center">
        <h2 class="font-semibold text-3xl">Cost Per Time</h2>
        <p class="text-sm text-base-content/60">Enter your hourly rate and time spent to see the real cost of any
          activity.</p>
      </div>
    </div>

    <div class="card bg-base-100">
      <div class="card-body gap-4 p-5">
        <label class="floating-label">
          <span>Hourly Rate</span>
          <input type="number" placeholder="Hourly Rate" class="input input-bordered w-full" />
        </label>
        <label class="floating-label">
          <span>Hours Spent</span>
          <input type="number" placeholder="Hours Spent" class="input input-bordered w-full" />
        </label>
        <button class="btn btn-primary w-full">Calculate</button>
      </div>
    </div>

  </div>
</section>
